# Hypridle 
# Modified for custom timeout preferences

$iDIR="$HOME/.config/swaync/images/ja.png"

general {
    lock_cmd = pidof hyprlock || hyprlock 
    before_sleep_cmd = loginctl lock-session    
    after_sleep_cmd = hyprctl dispatch dpms on 
    ignore_dbus_inhibit = false             
}

# Turn off screen - 5 minutes
listener {
    timeout = 300                                
    # Only turn off if the caffeine file does NOT exist
    on-timeout = test ! -f /tmp/caffeine_active && hyprctl dispatch dpms off       
    on-resume = hyprctl dispatch dpms on          
}

# Screenlock - 2 hours
listener {
    timeout = 7200                               
    on-timeout = test ! -f /tmp/caffeine_active && loginctl lock-session           
}

# Suspend - 2.5 hours
listener {
    timeout = 9000                               
    on-timeout = test ! -f /tmp/caffeine_active && systemctl suspend               
}
